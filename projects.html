<style>
        @import url('https://fonts.googleapis.com/css2?family=League+Spartan:wght@700&display=swap');
*{
    font-family: 'League Spartan', sans-serif;
  
   
}
a{
    text-decoration: none;
    color:#e00300;
}
        .navigation{
            position: fixed;
            top:0;
            padding-top: 30px;
            height:70px;
            opacity: 1;
            z-index: 200;
        }
        .line1::after{
        top: 35px;
    }
    .line2::after{
        top: 65px;
    }
    .line3::after{
        top: 95px;
    }
    .belownav {
        position: fixed;
        top: 0px;
        height: 100vh;
        width: 100vw;
        background-color: rgb(25, 24, 24);
        z-index: 102;
        display: flex;
        flex-direction: column;
        align-items: start;
        justify-content: center;
        transform: scale(1);
    }
    .belownav h1{
       width: 90%;
       text-align: center;
       margin: auto;
       font-size: 150px;
       border-bottom: #e00300 3px solid;
    }

    
    .project {
        position: relative;
        height: 300vh;
        width: 100vw;
        background-color: #e00300;
        z-index: 103;
    }
    .empty{
        width:100%;
        height:100vh;
        background-color: aqua;
    }
    .projects {
        height: 80vh;
        width: 100vw;
        background-color: rgb(25, 24, 24);
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
    }

    .projects>div {
        height: 100%;
        width: 50%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
    }

    .name {
        font-size: 50px;
        border-bottom: 4px solid #e00300;
        padding-bottom: 20px;
    }

    .explore {
        font-size: 43px;

    }

    .projects p {
        text-align: end;
    }
    .p1 {
        background-color: rgb(24, 25, 24);
        border:2px solid #e00300;
    }

    .p1>div,
    .p2>div {
        margin-bottom: 30px;
    }

    .p2 {
        background-color: rgb(24, 25, 24);
        border:2px solid #e00300;

    }
    @media only screen and (max-width: 600px) {
        .projects {
            height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }
        .projects p {
            text-align: start;

        }
        .projects>div {
            width: 100%;
            align-items: start;
            padding-left: 20px;
        }

        .projects>div>div {
            width: 100%;
        }
        .projects h1 {
            text-align: left;
            margin-top: 20px;

        }
        ion-icon {
            font-size: 16px;
        }
        .explore {
            font-size: 20px;
        }

    }
</style>
<body>

            <div class="list">
                <ul style="list-style: none;">
                    <a href="./index.html"><li class="line1">HOME&nbsp; </li></a>
                    <a href="./projects.html"><li class="line2">PROJECT&nbsp;</li></a>
                   <a href="./team.html"><li class="line3">TEAM&nbsp;</li></a> 
                  
                </ul>
            </div>

        </div>
    </nav>
    <div class="belownav">
       <h1>
        PROJECTS
       </h1>
     

    </div>
    <div class="project">
        <div class="empty"></div>
        <section>
            <div class="projects">
                <div class="p1">
                    <div>
                        <h1 class="name">ROVER</h1>
                        <p>Fig. 1</p>
                    </div>
                    <div>
                        <h1 class="explore">MORE<ion-icon name="arrow-forward-outline"></ion-icon></h1>
                    </div>
    
                </div>
                <div class="p2">
                    <div>
                        <h1 class="name">THANO POD</h1>
                        <p>Fig. 2</p>
                    </div>
                    <div>
                        <h1 class="explore">MORE<ion-icon name="arrow-forward-outline"></ion-icon></h1>
                    </div>
    
                </div>
                
            </div>
    
        </section>
    </div>
    <footer>
        <div class="foooter">
            <div class="flogo">

            <div class="fcopy">
                <ul>
                    <li>&copy; GENSUS 2023</li>
                    <li>ALL RIGHTS RESERVED.</li>
                </ul>
            </div>

    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

    <script>
        var fade = document.getElementsByClassName('belownav')[0];
        var nav = document.getElementsByClassName('navigation')[0];


        window.addEventListener(`scroll`, function (e) {
            const heroOpas = this.scrollY / 500;
            if (heroOpas === 0) {
                fade.style.opacity = 1;
                nav.style.opacity = 1;
            }
            if (heroOpas > 0) {
                fade.style.opacity = `${1 - heroOpas}`;
                nav.style.opacity = `${(1 - 10 * heroOpas)}`;
                fade.style.scale = `${(1 + 10 * heroOpas)}`;

            }
        });


        function myFunction(x) {
            x.classList.toggle("change");
            var modal = document.getElementsByClassName('modal')[0];


            modal.classList.toggle("open");
            nav.classList.toggle("fix");


        }
    </script>

</body>
